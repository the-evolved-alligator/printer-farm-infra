substitutions:
  device_name: esp-printer03-power
  friendly_name: Printer 03 Power

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp8266:
  board: esp01_1m

logger:

api:
  encryption:
    key: !secret printer03_api_key

ota:
  - platform: esphome
    password: !secret printer03_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  ap:
    ssid: "Printer03 Power Fallback"
    password: !secret printer03_fallback_ap_password

captive_portal:

binary_sensor:
  - platform: gpio
    pin: GPIO3
    name: "${friendly_name} Switch"
    on_press:
      - light.toggle: printer_power_switch
    on_release:
      - light.toggle: printer_power_switch

output:
  - platform: gpio
    pin: GPIO2
    id: printer_power

light:
  - platform: binary
    name: "${friendly_name}"
    output: printer_power
    id: printer_power_switch
